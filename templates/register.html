{% extends "base.html" %}

{% block title %}Create account — Jagam Footwear{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <h1 class="pdp-title" style="text-align:center;margin-bottom:0.35rem;">Create your account</h1>
    <p class="muted" style="text-align:center;margin-bottom:1.5rem;">One account for your bag, orders, and future loyalty perks.</p>
    <form action="{% url 'register' %}" method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="first_name">First name</label>
        <input type="text" id="first_name" name="first_name" required autocomplete="given-name">
      </div>
      <div class="form-group">
        <label for="last_name">Last name</label>
        <input type="text" id="last_name" name="last_name" required autocomplete="family-name">
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" id="password1" name="password1" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>
    <p class="muted" style="text-align:center;margin-top:1.25rem;">Already registered? <a href="{% url 'login' %}">Sign in</a></p>
  </div>
</div>
{% endblock %}
