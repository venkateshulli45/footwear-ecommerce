<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ notification.title }}</title>
</head>
<body style="font-family:system-ui,Segoe UI,sans-serif;line-height:1.5;color:#1a1a1a;max-width:36rem;margin:1.5rem auto;padding:0 1rem;">
  <p style="margin:0 0 0.5rem;font-size:0.85rem;color:#555;">{{ site_name }}</p>
  <h1 style="font-size:1.25rem;margin:0 0 0.75rem;">{{ notification.title }}</h1>
  {% if notification.body %}
  <p style="margin:0 0 1rem;white-space:pre-wrap;">{{ notification.body }}</p>
  {% endif %}
  {% if absolute_link %}
  <p style="margin:0;">
    <a href="{{ absolute_link }}" style="color:#1e3a2f;">View in store</a>
  </p>
  {% endif %}
</body>
</html>
