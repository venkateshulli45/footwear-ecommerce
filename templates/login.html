{% extends "base.html" %}

{% block title %}Sign in — Jagam Footwear{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <h1 class="pdp-title" style="text-align:center;margin-bottom:0.35rem;">Welcome back</h1>
    <p class="muted" style="text-align:center;margin-bottom:1.5rem;">Sign in to save items and complete checkout.</p>
    <form action="{% url 'login' %}" method="post">
      {% csrf_token %}
      {% if request.GET.next %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
      {% endif %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" id="password1" name="password1" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-accent btn-block">Sign in</button>
    </form>
    <p class="muted" style="text-align:center;margin-top:1.25rem;">New here? <a href="{% url 'register' %}">Create an account</a></p>
  </div>
</div>
{% endblock %}
