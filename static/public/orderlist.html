        .opt {
         display:grid;
            grid-template-columns: 6fr 6fr;
        }
    </style>
</head>
<body>
    <ol type="1">
        <li>Question _________________?</li>
        <ol type="a" class="opt">
        <li>Option-1</li>
        <li>Option-2</li>
        <li>Option-3</li>
        <li>Option-4</li>
